<!doctype html>
<html lang="en">
  <head>

    <meta
      name="viewport"

    />
    <title>Moyo Header</title>
    <link

      href="style.css"
    />

  <body>

        />

      <nav class="header__nav">

          <li class="nav__item">
            <a

          </li>
          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              SAMSUNG
            </a>

          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              SMARTPHONES
            </a>
          </li>
          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
              data-qa="hover"

              LAPTOPS & COMPUTERS
            </a>
          </li>
          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              GADGETS
            </a>
          </li>
          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              TABLETS
            </a>
          </li>
          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              PHOTO
            </a>
          </li>
          <li class="nav__item">
            <a
              href="#"
              class="nav__link"
            >
              VIDEO
            </a>
          </li>
        </ul>
      </nav>

</html>
